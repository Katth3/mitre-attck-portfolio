title: PowerShell Encoded Command Execution 
id: a7b3c2d1-4e5f-6789-abcd-ef0123456789
status: test
description: >
  Detects PowerShell execution using the -EncodedCommand flag, commonly used
  by threat actors (APT29, Lazarus) to obfuscate malicious scripts and evade
  detection. Mapped to MITRE ATT&CK T1059.001.
author: Edna Katerine Ruiz Gutierrez
date: 2026-06-13
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1059.001
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - '-EncodedCommand'
      - '-enc '
      - '-ec '
  condition: selection
falsepositives:
  - Legitimate administrative scripts using encoded commands
  - Software deployment tools (SCCM, Intune)
  - Some backup solutions
level: medium
fields:
  - CommandLine
  - ParentImage
  - User
  - ComputerName
