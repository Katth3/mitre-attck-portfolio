title: LSASS Memory Access — Credential Dumping
id: c9d5e4f3-6a7b-890c-def0-123456789012
status: test
description: >
  Detects attempts to access LSASS process memory, a common technique for
  credential dumping using tools like Mimikatz, ProcDump, or Task Manager.
  Used extensively by APT29 (T1003.001) for lateral movement after initial access.
  Requires Sysmon Event ID 10 with LSASS as target.
author: Edna Katerine Ruiz Gutierrez
date: 2026-06-13
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1003.001
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: process_access
  product: windows
detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess|contains:
      - '0x1010'
      - '0x1038'
      - '0x1410'
      - '0x143a'
  filter_legitimate:
    SourceImage|contains:
      - '\MsMpEng.exe'
      - '\AntimalwareServiceExecutable'
      - '\svchost.exe'
  condition: selection and not filter_legitimate
falsepositives:
  - Security tools and EDR agents accessing LSASS legitimately
  - Some backup solutions
  - Verify SourceImage before escalating
level: high
fields:
  - SourceImage
  - TargetImage
  - GrantedAccess
  - CallTrace
  - User
